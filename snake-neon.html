<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE // NEON</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
}

/* Animated bg grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 8s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* Scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 10;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 5;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0 4px;
}

.title {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  color: #00ff64;
  text-shadow: 0 0 10px #00ff64, 0 0 30px #00ff6480;
  letter-spacing: 4px;
}

.title span { color: #fff; opacity: 0.3; }

.score-panel {
  display: flex;
  gap: 24px;
}

.score-item {
  text-align: right;
}

.score-label {
  font-size: 9px;
  color: #00ff6460;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.score-value {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: #00ff64;
  text-shadow: 0 0 8px #00ff64;
  transition: transform 0.1s;
}

.score-value.pop {
  animation: scorePop 0.3s ease;
}

@keyframes scorePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); color: #fff; text-shadow: 0 0 20px #fff; }
  100% { transform: scale(1); }
}

/* Canvas wrapper */
.canvas-wrap {
  position: relative;
  border: 1px solid #00ff6430;
  box-shadow:
    0 0 0 1px #00ff6415,
    0 0 30px #00ff6420,
    0 0 60px #00ff6410,
    inset 0 0 30px #00000080;
  border-radius: 4px;
}

canvas {
  display: block;
  border-radius: 3px;
}

/* Corner decorations */
.canvas-wrap::before,
.canvas-wrap::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-color: #00ff64;
  border-style: solid;
}
.canvas-wrap::before {
  top: -1px; left: -1px;
  border-width: 2px 0 0 2px;
  box-shadow: -2px -2px 8px #00ff6460;
}
.canvas-wrap::after {
  bottom: -1px; right: -1px;
  border-width: 0 2px 2px 0;
  box-shadow: 2px 2px 8px #00ff6460;
}

/* Level bar */
.level-bar-wrap {
  width: 100%;
  height: 2px;
  background: #00ff6415;
  border-radius: 1px;
  overflow: hidden;
}

.level-bar {
  height: 100%;
  background: linear-gradient(90deg, #00ff64, #00ffcc);
  box-shadow: 0 0 8px #00ff64;
  transition: width 0.5s ease;
  width: 0%;
}

/* Controls hint */
.controls {
  display: flex;
  gap: 16px;
  font-size: 10px;
  color: #00ff6440;
  letter-spacing: 1px;
}

/* Overlay screens */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.88);
  border-radius: 3px;
  gap: 16px;
  backdrop-filter: blur(2px);
  z-index: 20;
}

.overlay-title {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  color: #00ff64;
  text-shadow: 0 0 20px #00ff64, 0 0 40px #00ff6480;
  animation: titlePulse 2s ease infinite;
}

@keyframes titlePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.overlay-subtitle {
  font-size: 11px;
  color: #00ff6480;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.overlay-score {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: #fff;
  letter-spacing: 2px;
  opacity: 0.6;
}

.start-btn {
  margin-top: 8px;
  padding: 10px 32px;
  background: transparent;
  border: 1px solid #00ff64;
  color: #00ff64;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  box-shadow: 0 0 12px #00ff6430, inset 0 0 12px #00ff6410;
}

.start-btn:hover {
  background: #00ff6420;
  box-shadow: 0 0 20px #00ff6460, inset 0 0 20px #00ff6420;
  transform: scale(1.03);
}

.highscore-line {
  font-size: 10px;
  color: #00ff6450;
  letter-spacing: 2px;
}

/* Particle canvas */
#particle-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 15;
  border-radius: 3px;
}

/* Mobile controls */
.mobile-controls {
  display: none;
  grid-template-columns: repeat(3, 48px);
  grid-template-rows: repeat(2, 48px);
  gap: 4px;
  margin-top: 4px;
}

.mob-btn {
  background: #00ff6410;
  border: 1px solid #00ff6430;
  color: #00ff64;
  font-size: 18px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.mob-btn:active { background: #00ff6430; transform: scale(0.95); }
.mob-up { grid-column: 2; grid-row: 1; }
.mob-left { grid-column: 1; grid-row: 2; }
.mob-down { grid-column: 2; grid-row: 2; }
.mob-right { grid-column: 3; grid-row: 2; }

@media (max-width: 600px) {
  .mobile-controls { display: grid; }
  .controls { display: none; }
  .title { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">SNAKE <span>//</span> NEON</div>
    <div class="score-panel">
      <div class="score-item">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-display">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Best</div>
        <div class="score-value" id="best-display">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Level</div>
        <div class="score-value" id="level-display">1</div>
      </div>
    </div>
  </div>

  <div class="level-bar-wrap">
    <div class="level-bar" id="level-bar"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <canvas id="particle-canvas" width="400" height="400"></canvas>

    <!-- Start screen -->
    <div class="overlay" id="overlay-start">
      <div class="overlay-title">SNAKE</div>
      <div class="overlay-subtitle">// Neon Edition //</div>
      <div class="highscore-line" id="hs-line">BEST: 0</div>
      <button class="start-btn" onclick="startGame()">[ AVVIA ]</button>
      <div class="overlay-score" style="font-size:9px; margin-top:4px;">WASD / FRECCE per muovere</div>
    </div>

    <!-- Game over screen -->
    <div class="overlay" id="overlay-gameover" style="display:none">
      <div class="overlay-title" style="color:#ff3060; text-shadow: 0 0 20px #ff3060;">GAME OVER</div>
      <div class="overlay-score" id="final-score">PUNTEGGIO: 0</div>
      <div class="highscore-line" id="go-hs">BEST: 0</div>
      <button class="start-btn" style="border-color:#ff3060; color:#ff3060; box-shadow: 0 0 12px #ff306030;" onclick="startGame()">[ RIPROVA ]</button>
    </div>
  </div>

  <div class="controls">
    <span>↑↓←→ MUOVI</span>
    <span>·</span>
    <span>WASD ALTERNATIVO</span>
    <span>·</span>
    <span>P PAUSA</span>
  </div>

  <div class="mobile-controls">
    <button class="mob-btn mob-up" ontouchstart="setDir(0,-1)">↑</button>
    <button class="mob-btn mob-left" ontouchstart="setDir(-1,0)">←</button>
    <button class="mob-btn mob-down" ontouchstart="setDir(0,1)">↓</button>
    <button class="mob-btn mob-right" ontouchstart="setDir(1,0)">→</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

// Colors
const C = {
  bg: '#00050a',
  grid: 'rgba(0,255,100,0.04)',
  snake: '#00ff64',
  snakeGlow: '#00ff64',
  snakeDark: '#00cc50',
  head: '#ffffff',
  food: '#ff6030',
  foodGlow: '#ff8040',
  bonus: '#ffcc00',
};

let snake, dir, nextDir, food, bonusFood;
let score, best, level, lives;
let gameLoop, paused, running;
let particles = [];
let frameCount = 0;
let foodPulse = 0;

// Load best
best = parseInt(localStorage.getItem('snake_best') || '0');
document.getElementById('best-display').textContent = best;
document.getElementById('hs-line').textContent = 'BEST: ' + best;
document.getElementById('go-hs').textContent = 'BEST: ' + best;

function startGame() {
  document.getElementById('overlay-start').style.display = 'none';
  document.getElementById('overlay-gameover').style.display = 'none';

  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  paused = false;
  running = true;
  particles = [];
  bonusFood = null;
  frameCount = 0;

  updateScore(0);
  spawnFood();

  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function getSpeed() {
  return Math.max(60, 160 - (level - 1) * 12);
}

function tick() {
  if (paused || !running) return;
  frameCount++;
  foodPulse = (foodPulse + 0.12) % (Math.PI * 2);

  dir = nextDir;

  const head = {
    x: (snake[0].x + dir.x + COLS) % COLS,
    y: (snake[0].y + dir.y + ROWS) % ROWS
  };

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // Eat food
  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    ate = true;
    spawnParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2, C.food, 18);
    updateScore(score + 10 * level);
    spawnFood();

    // Bonus food every 5 foods
    if (score > 0 && score % 50 === 0) spawnBonusFood();

    // Level up every 5 eats
    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel > level) {
      level = newLevel;
      document.getElementById('level-display').textContent = level;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
      spawnParticles(canvas.width/2, canvas.height/2, '#ffcc00', 30);
    }
  }

  // Eat bonus
  if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
    ate = true;
    spawnParticles(bonusFood.x * CELL + CELL/2, bonusFood.y * CELL + CELL/2, C.bonus, 25);
    updateScore(score + 50 * level);
    bonusFood = null;
  }

  if (!ate) snake.pop();

  // Update level bar
  const progress = (score % 50) / 50 * 100;
  document.getElementById('level-bar').style.width = progress + '%';

  draw();
  updateParticles();
}

function spawnFood() {
  do {
    food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function spawnBonusFood() {
  do {
    bonusFood = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS), timer: 120 };
  } while (snake.some(s => s.x === bonusFood.x && s.y === bonusFood.y) || (bonusFood.x === food.x && bonusFood.y === food.y));
}

function updateScore(val) {
  score = val;
  const el = document.getElementById('score-display');
  el.textContent = score;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');

  if (score > best) {
    best = score;
    localStorage.setItem('snake_best', best);
    document.getElementById('best-display').textContent = best;
  }
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);

  // Explode snake
  snake.forEach(seg => {
    spawnParticles(seg.x * CELL + CELL/2, seg.y * CELL + CELL/2, C.snake, 4);
  });

  setTimeout(() => {
    document.getElementById('overlay-gameover').style.display = 'flex';
    document.getElementById('final-score').textContent = 'PUNTEGGIO: ' + score;
    document.getElementById('go-hs').textContent = 'BEST: ' + best;
    document.getElementById('hs-line').textContent = 'BEST: ' + best;
  }, 600);
}

// ── DRAWING ──
function draw() {
  // Clear
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(canvas.width, y * CELL);
    ctx.stroke();
  }

  // Food
  drawFood();

  // Bonus food
  if (bonusFood) {
    bonusFood.timer--;
    if (bonusFood.timer <= 0) { bonusFood = null; }
    else drawBonus();
  }

  // Snake
  drawSnake();
}

function drawFood() {
  const x = food.x * CELL + CELL/2;
  const y = food.y * CELL + CELL/2;
  const pulse = Math.sin(foodPulse) * 0.3 + 0.7;
  const r = (CELL/2 - 3) * pulse;

  // Outer glow
  const grd = ctx.createRadialGradient(x, y, 0, x, y, r * 2.5);
  grd.addColorStop(0, 'rgba(255,96,48,0.4)');
  grd.addColorStop(1, 'rgba(255,96,48,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(x, y, r * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.shadowBlur = 15;
  ctx.shadowColor = C.foodGlow;
  ctx.fillStyle = C.food;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Shine
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(x - r*0.25, y - r*0.25, r*0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawBonus() {
  if (!bonusFood) return;
  const x = bonusFood.x * CELL + CELL/2;
  const y = bonusFood.y * CELL + CELL/2;
  const blink = bonusFood.timer < 40 ? Math.sin(frameCount * 0.5) > 0 : true;
  if (!blink) return;

  const pulse = Math.sin(foodPulse * 2) * 0.2 + 0.8;
  const r = (CELL/2 - 2) * pulse;

  ctx.shadowBlur = 20;
  ctx.shadowColor = C.bonus;
  ctx.fillStyle = C.bonus;
  ctx.beginPath();
  // Star shape
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI / 5) - Math.PI/2;
    const angle2 = ((i * 4 + 2) * Math.PI / 5) - Math.PI/2;
    if (i === 0) ctx.moveTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
    else ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
    ctx.lineTo(x + r*0.4 * Math.cos(angle2), y + r*0.4 * Math.sin(angle2));
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const x = seg.x * CELL;
    const y = seg.y * CELL;
    const pad = isHead ? 1 : 2;
    const r = isHead ? 5 : 4;

    // Glow for head and first few segments
    if (i < 6) {
      ctx.shadowBlur = isHead ? 20 : 10 - i;
      ctx.shadowColor = C.snakeGlow;
    } else {
      ctx.shadowBlur = 0;
    }

    // Segment color gradient along body
    const alpha = Math.max(0.3, 1 - (i / snake.length) * 0.7);
    ctx.fillStyle = isHead ? '#ffffff' : `rgba(0, ${Math.floor(200 + 55 * alpha)}, ${Math.floor(80 * alpha)}, ${alpha})`;

    roundRect(ctx, x + pad, y + pad, CELL - pad*2, CELL - pad*2, r);
    ctx.fill();

    // Eyes on head
    if (isHead) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      const ex = dir.x === 0 ? [4, 12] : (dir.x > 0 ? [12, 12] : [4, 4]);
      const ey = dir.y === 0 ? [5, 5] : (dir.y > 0 ? [12, 12] : [4, 4]);
      const ew = dir.x === 0 ? [3, 3] : [3, 3];
      const eh = dir.y === 0 ? [4, 4] : [3, 3];

      if (dir.x !== 0) {
        ctx.fillRect(x + ex[0] - 1, y + 5, 3, 4);
        ctx.fillRect(x + ex[0] - 1, y + 11, 3, 4);
        ctx.fillStyle = '#00ff64';
        ctx.fillRect(x + ex[0], y + 6, 2, 2);
        ctx.fillRect(x + ex[0], y + 12, 2, 2);
      } else {
        ctx.fillRect(x + 5, y + ey[0] - 1, 4, 3);
        ctx.fillRect(x + 11, y + ey[0] - 1, 4, 3);
        ctx.fillStyle = '#00ff64';
        ctx.fillRect(x + 6, y + ey[0], 2, 2);
        ctx.fillRect(x + 12, y + ey[0], 2, 2);
      }
    }
  });
  ctx.shadowBlur = 0;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── PARTICLES ──
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.04 + 0.02,
      size: Math.random() * 4 + 1,
      color
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1; // gravity
    p.vx *= 0.97;
    p.life -= p.decay;

    pCtx.globalAlpha = Math.max(0, p.life);
    pCtx.shadowBlur = 6;
    pCtx.shadowColor = p.color;
    pCtx.fillStyle = p.color;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fill();
  });
  pCtx.globalAlpha = 1;
  pCtx.shadowBlur = 0;
}

// ── CONTROLS ──
function setDir(x, y) {
  if (!running) return;
  if (x === 1 && dir.x === -1) return;
  if (x === -1 && dir.x === 1) return;
  if (y === 1 && dir.y === -1) return;
  if (y === -1 && dir.y === 1) return;
  nextDir = { x, y };
}

document.addEventListener('keydown', e => {
  const keys = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
    W: [0,-1], S: [0,1], A: [-1,0], D: [1,0]
  };
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    return;
  }
  if (keys[e.key]) {
    e.preventDefault();
    const [x, y] = keys[e.key];
    setDir(x, y);
  }
});

// Initial draw
ctx.fillStyle = C.bg;
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
